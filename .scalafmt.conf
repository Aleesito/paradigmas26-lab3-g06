version = "3.10.7"
runner.dialect = scala213

maxColumn = 100

indent.main = 2

align.preset = more
align.multiline = true

newlines.alwaysBeforeElseAfterCurlyIf = false
newlines.beforeCurlyLambdaParams = never

rewrite.rules = [
  RedundantBraces,
  RedundantParens,
  SortImports,
  PreferCurlyFors
]

rewrite.redundantBraces.stringInterpolation = true

docstrings.style = keep